<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CNEFX Game Hub</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: radial-gradient(circle at top, #1b1f3a, #0a0a0f 60%);
    overflow-x: hidden;
  }

  /* subtle grid background */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    opacity: 0.35;
    pointer-events: none;
  }

  /* 🏠 HOME BUTTON */
  .home-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 10px 14px;
    background: rgba(30,30,30,0.9);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    backdrop-filter: blur(8px);
    transition: 0.2s;
    z-index: 9999;
  }

  .home-btn:hover {
    transform: scale(1.05);
    background: rgba(50,50,50,0.9);
  }

  header {
    text-align: center;
    padding: 80px 20px 25px;
  }

  header h1 {
    margin: 0;
    font-size: 42px;
    letter-spacing: 2px;
  }

  .status {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.75;
  }

  .online {
    color: #00ff88;
    font-weight: bold;
  }

  /* STATUS BUTTON */
  .status-btn {
    margin-top: 12px;
    padding: 7px 14px;
    border: none;
    border-radius: 8px;
    background: #00ff88;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }

  .status-btn:hover {
    background: #00cc6a;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 18px;
    padding: 30px;
    max-width: 900px;
    margin: auto;
  }

  /* CARD */
  .card {
    background: rgba(25,25,25,0.85);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 18px;
    text-align: center;
    transition: 0.25s;
    backdrop-filter: blur(6px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  .card:hover {
    transform: translateY(-6px) scale(1.03);
    border-color: rgba(0,255,136,0.3);
    box-shadow: 0 12px 40px rgba(0,255,136,0.08);
  }

  h3 {
    margin: 10px 0 5px;
  }

  p {
    font-size: 13px;
    opacity: 0.7;
  }

  button {
    margin-top: 10px;
    padding: 7px 14px;
    border: none;
    border-radius: 8px;
    background: #00ff88;
    color: black;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background: #00cc6a;
  }

  a {
    text-decoration: none;
    color: inherit;
  }

  footer {
    text-align: center;
    padding: 30px;
    font-size: 12px;
    opacity: 0.4;
  }
</style>
</head>

<body>

<!-- 🏠 HOME BUTTON -->
<a href="index.html" class="home-btn">CNEFX</a>

<!-- HEADER -->
<header>
  <h1>CNEFX Game Hub</h1>

  <div class="status">
    Status: <span class="online">Online</span>
  </div>

  <a href="https://stats.uptimerobot.com/Yvcw7PIGbv">
    <button class="status-btn">Check server status</button>
  </a>
</header>

<!-- GAME GRID -->
<div class="grid" id="gameGrid"></div>

<footer>
  built by CNEFX 🚀
</footer>

<!-- LOAD GAME DATA -->
<script src="games.js"></script>

<!-- AUTO BUILD GAMES -->
<script>
const grid = document.getElementById("gameGrid");

games.forEach(game => {
  grid.innerHTML += `
    <a href="${game.file}">
      <div class="card">
        <h3>${game.name}</h3>
        <p>${game.desc}</p>
        <button>Play</button>
      </div>
    </a>
  `;
});
</script>

</body>
</html>
