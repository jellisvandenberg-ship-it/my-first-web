<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d0d0d;
      color: white;
      text-align: center;
    }

    header {
      padding: 40px;
    }

    .status {
      font-size: 14px;
      opacity: 0.8;
    }

    .online {
      color: #00ff88;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
      padding: 20px;
      max-width: 700px;
      margin: auto;
    }

    .card {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 12px;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
      background: #2a2a2a;
    }

    a {
      color: white;
      text-decoration: none;
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <header>
    <h1>🎮 My Game Hub</h1>
    <p class="status">Status: <span class="online">Online</span></p>
    <a href="status.html">Check server status</a>
  </header>

  <div class="grid">

    <div class="card">
      <h3>Game 1</h3>
      <p>Coming soon</p>
    </div>

    <div class="card">
      <h3>Game 2</h3>
      <p>Coming soon</p>
    </div>

    <div class="card">
      <h3>Status</h3>
      <p>Uptime page</p>
      <a href="https://stats.uptimerobot.com/Yvcw7PIGbv"
    </div>

  </div>

  <footer>
    built in 10 minutes 🚀
  </footer>

</body>
</html>
