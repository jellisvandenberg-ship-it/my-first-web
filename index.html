<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CNEFX' Game Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d0d0d;
      color: white;
      text-align: center;
    }

    header {
      padding: 40px;
    }

    .status {
      font-size: 14px;
      opacity: 0.8;
    }

    .online {
      color: #00ff88;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 12px;
      transition: 0.2s;
      text-align: center;
    }

    .card:hover {
      transform: scale(1.05);
      background: #2a2a2a;
    }

    a {
      color: white;
      text-decoration: none;
    }

    .game-pfp {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      object-fit: cover;
      border: 2px solid #333;
      margin-bottom: 10px;
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      opacity: 0.5;
    }

    button {
      margin-top: 10px;
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background: #00ff88;
      color: black;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #00cc6a;
    }
  </style>
</head>

<body>

  <header>
    <h1>CNEFX Game Hub</h1>
    <p class="status">Status: <span class="online">Online</span></p>
    <a href="status.html">Check server status</a>
  </header>

  <div class="grid">

    <!-- TETRIS -->
    <a href="tetris.html">
      <div class="card">
        <img class="game-pfp" src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Tetrominoes_IJLSZ.png" alt="Tetris">

        <h3>TETRIS</h3>
        <p>Stack blocks. Clear lines. Survive.</p>

        <button>Play</button>
      </div>
    </a>

    <!-- Game 2 placeholder -->
    <div class="card">
      <h3>Game 2</h3>
      <p>Coming soon</p>
    </div>

    <!-- STATUS CARD -->
    <div class="card">
      <h3>Server Status</h3>
      <p>Uptime page</p>

      <a href="https://stats.uptimerobot.com/Yvcw7PIGbv" target="_blank">
        <button>Check status</button>
      </a>
    </div>

  </div>

  <footer>
    Hope you have fun
  </footer>

</body>
</html>
