<script src="games.js"></script>

<script>
window.addEventListener("DOMContentLoaded", () => {

  try {

    /* =========================
       👤 USER SYSTEM
    ========================= */
    let user = null;

    try {
      const raw = localStorage.getItem("user");
      user = raw ? JSON.parse(raw) : null;
    } catch (e) {
      user = null;
    }

    const userBox = document.getElementById("userBox");
    const accBtn = document.getElementById("accountBtn");

    if (userBox) {
      if (user) {
        userBox.innerHTML = `
          <img src="${user.photo || 'https://via.placeholder.com/35'}">
          <span>Welcome, ${user.name || "Player"}</span>
        `;
      } else {
        userBox.innerHTML = `<span>Not logged in</span>`;
      }
    }

    if (accBtn) {
      if (user) {
        accBtn.style.display = "block";
        accBtn.onclick = () => {
          window.location.href = "profile.html";
        };
      } else {
        accBtn.style.display = "none";
      }
    }

    /* =========================
       🎮 CHECK GAMES
    ========================= */
    if (!Array.isArray(window.games)) {
      console.warn("games.js missing or broken");
      return;
    }

    const grid = document.getElementById("gameGrid");
    const searchInput = document.getElementById("searchInput");

    function randomSize() {
      const r = Math.random();
      if (r < 0.15) return "large";
      if (r < 0.45) return "medium";
      return "small";
    }

    function render(list) {
      if (!grid) return;

      grid.innerHTML = "";

      list.slice(0, 20).forEach(game => {
        const a = document.createElement("a");
        a.href = game.file;

        const card = document.createElement("div");
        card.className = `card ${randomSize()}`;

        card.innerHTML = `
          <h3>${game.name}</h3>
          <p>${game.desc}</p>
        `;

        a.appendChild(card);
        grid.appendChild(a);
      });
    }

    render([...games].sort(() => Math.random() - 0.5));

    /* =========================
       🔍 SEARCH
    ========================= */
    if (searchInput) {
      searchInput.addEventListener("input", (e) => {
        const v = e.target.value.toLowerCase();

        render(
          games.filter(g =>
            g.name.toLowerCase().includes(v) ||
            g.desc.toLowerCase().includes(v)
          )
        );
      });
    }

    /* =========================
       🔥 FEATURED GAME
    ========================= */
    const title = document.getElementById("featuredTitle");
    const desc = document.getElementById("featuredDesc");
    const btn = document.getElementById("featuredBtn");

    if (Array.isArray(games) && games.length > 0 && title && desc && btn) {

      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 1);
      const week = Math.floor((now - start) / 604800000);

      const featured = games[week % games.length];

      title.textContent = "🔥 Featured: " + featured.name;
      desc.textContent = featured.desc;

      btn.onclick = () => {
        window.location.href = featured.file;
      };
    }

  } catch (err) {
    console.error("Script crashed but was stopped safely:", err);
  }

});
</script>
