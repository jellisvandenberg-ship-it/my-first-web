<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CNEFX Game Hub</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: radial-gradient(circle at top, #1b1f3a, #0a0a0f 60%);
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    opacity: 0.35;
    pointer-events: none;
  }

  /* HOME */
  .home-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 10px 14px;
    background: rgba(30,30,30,0.9);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    z-index: 9999;
    transition: 0.2s;
  }
  .home-btn:hover { transform: scale(1.05); background: rgba(50,50,50,0.9); }

  /* DISCORD */
  .discord-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    padding: 10px 14px;
    background: #5865F2;
    border-radius: 10px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    z-index: 9999;
    transition: 0.2s;
  }
  .discord-btn:hover { transform: scale(1.05); background: #4752c4; }

  header {
    text-align: center;
    padding: 80px 20px 10px;
  }

  header h1 {
    margin: 0;
    font-size: 44px;
  }

  .status {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.75;
  }

  .online {
    color: #00ff88;
    font-weight: bold;
  }

  /* SEARCH */
  .search-box {
    text-align: center;
    margin-top: 15px;
  }

  .search-box input {
    width: 80%;
    max-width: 500px;
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    outline: none;
  }

  /* FEATURED */
  .featured {
    max-width: 900px;
    margin: 20px auto;
    padding: 18px;
    background: rgba(25,25,25,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .featured button {
    padding: 10px 16px;
    background: #00ff88;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-auto-rows: 120px;
    gap: 14px;
    padding: 25px;
    max-width: 1100px;
    margin: auto;
  }

  /* CARDS */
  .card {
    background: rgba(25,25,25,0.85);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 14px;
    text-align: center;
    transition: 0.25s;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .card:hover {
    transform: translateY(-6px) scale(1.03);
    border-color: rgba(0,255,136,0.3);
  }

  .card.small { grid-column: span 2; }
  .card.medium { grid-column: span 3; }
  .card.large { grid-column: span 3; grid-row: span 2; }

  footer {
    text-align: center;
    padding: 30px;
    font-size: 12px;
    opacity: 0.4;
  }
</style>
</head>

<body>

<a href="index.html" class="home-btn">CNEFX</a>

<a href="https://discord.gg/fQTDBBckPW" target="_blank" class="discord-btn">
Discord
</a>

<header>
  <h1>CNEFX Game Hub</h1>
  <div class="status">Status: <span class="online">Online</span></div>
</header>

<div class="search-box">
  <input id="searchInput" placeholder="Search games...">
</div>

<div class="featured">
  <div>
    <h2 id="featuredTitle">Featured Game</h2>
    <p id="featuredDesc" style="opacity:0.7"></p>
  </div>
  <button id="featuredBtn">Play Now</button>
</div>

<div class="grid" id="gameGrid"></div>

<footer>built by CNEFX 🚀</footer>

<script src="games.js"></script>

<script>
const grid = document.getElementById("gameGrid");
const searchInput = document.getElementById("searchInput");

/* shuffle */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* weekly featured */
function week() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 1);
  return Math.floor((now - start) / (1000 * 60 * 60 * 24 * 7));
}

const featured = games[week() % games.length];

document.getElementById("featuredTitle").innerText =
"🔥 Featured: " + featured.name;

document.getElementById("featuredDesc").innerText =
featured.desc;

document.getElementById("featuredBtn").onclick = () => {
  window.location.href = featured.file;
};

/* render */
function size() {
  const r = Math.random();
  if (r < 0.15) return "large";
  if (r < 0.45) return "medium";
  return "small";
}

function render(list) {
  grid.innerHTML = "";
  list.slice(0, 20).forEach(g => {
    grid.innerHTML += `
      <a href="${g.file}">
        <div class="card ${size()}">
          <h3>${g.name}</h3>
          <p>${g.desc}</p>
        </div>
      </a>
    `;
  });
}

/* initial */
let base = shuffle([...games]);
render(base);

/* search */
searchInput.addEventListener("input", (e) => {
  const v = e.target.value.toLowerCase();
  const filtered = games.filter(g =>
    g.name.toLowerCase().includes(v) ||
    g.desc.toLowerCase().includes(v)
  );
  render(filtered);
});
</script>

</body>
</html>
